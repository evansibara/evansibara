name: GitHub Metrics

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: evansibara
          filename: github/metrics.svg

          # Base config
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          base_hireable: yes

          # ── PLUGINS ──────────────────────────────────────────

          # Isometric commit calendar (3D like the example)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14

          # Introduction / bio
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Code habits (commit time heatmap)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: "0%"

          # Stars given
          plugin_stars: yes
          plugin_stars_limit: 4

          # Repositories pinned / notable
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes

          # Topics
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: mastered
          plugin_topics_limit: 0

          # Reactions
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_limit_issues: 100
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_days: 0
          plugin_reactions_display: absolute
          plugin_reactions_details: count, percentage
          plugin_reactions_ignored: evansibara

          # PageSpeed (update URL to your own site if any)
          # plugin_pagespeed: yes
          # plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          # plugin_pagespeed_url: https://your-site.com
          # plugin_pagespeed_detailed: yes
          # plugin_pagespeed_screenshot: yes

          # Music (optional — uncomment and configure)
          # plugin_music: yes
          # plugin_music_provider: apple
          # plugin_music_token: ${{ secrets.MUSIC_TOKEN }}
          # plugin_music_mode: recent
          # plugin_music_limit: 4
